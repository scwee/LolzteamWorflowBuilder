# HTTP-only (до получения SSL). server_name "_" принимает любой хост (IP или домен).

upstream lzt_web {
    server web:3000;
}

upstream lzt_api {
    server api:8000;
}

# /credentials, /integrations — одновременно страницы фронтенда и API-пути.
# API-клиент фронта шлёт заголовок X-Request-ID на каждый вызов → в api;
# навигация браузера и RSC-префетчи идут без него → в web.
map $http_x_request_id $lzt_page_backend {
    ""       lzt_web;
    default  lzt_api;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Без URI в proxy_pass и без трейлинг-слэша в location:
    # иначе nginx отвечает 301 на /flows без слэша и ломает POST.
    location /flows {
        proxy_pass http://lzt_api;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    location /hooks/ {
        proxy_pass http://lzt_api;
    }

    location /catalog {
        proxy_pass http://lzt_api;
    }

    location /lzt-accounts {
        proxy_pass http://lzt_api;
    }

    location /health {
        proxy_pass http://lzt_api;
    }

    location /integrations {
        proxy_pass http://$lzt_page_backend;
    }

    location /credentials {
        proxy_pass http://$lzt_page_backend;
    }

    location / {
        proxy_pass http://lzt_web;
        # proxy_set_header в location отменяет унаследованные — повторяем все.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
