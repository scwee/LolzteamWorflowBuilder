services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lztbuilder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lztbuilder}
      POSTGRES_DB: ${POSTGRES_DB:-lztbuilder}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lztbuilder} -d ${POSTGRES_DB:-lztbuilder}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lztbuilder}:${POSTGRES_PASSWORD:-lztbuilder}@postgres:5432/${POSTGRES_DB:-lztbuilder}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-lztbuilder}:${POSTGRES_PASSWORD:-lztbuilder}@postgres:5432/${POSTGRES_DB:-lztbuilder}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["api"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  worker:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lztbuilder}:${POSTGRES_PASSWORD:-lztbuilder}@postgres:5432/${POSTGRES_DB:-lztbuilder}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-lztbuilder}:${POSTGRES_PASSWORD:-lztbuilder}@postgres:5432/${POSTGRES_DB:-lztbuilder}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: ["worker"]
    restart: unless-stopped

  beat:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lztbuilder}:${POSTGRES_PASSWORD:-lztbuilder}@postgres:5432/${POSTGRES_DB:-lztbuilder}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-lztbuilder}:${POSTGRES_PASSWORD:-lztbuilder}@postgres:5432/${POSTGRES_DB:-lztbuilder}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: ["beat"]
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - web
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  certbot_www:
